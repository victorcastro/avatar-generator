<!doctype html>
<html lang="en" data-theme="dark">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Community Avatar Generator</title>
      <link rel="stylesheet" href="/node_modules/@picocss/pico/css/pico.red.min.css">
      <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
      <link rel="stylesheet" href="styles.css">
    </head>
  <body>
    <main class="shell container-fluid">
      <section class="hero-panel">
        <a
          class="repo-link"
          href="https://github.com/victorcastro/avatar-generator"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="Open GitHub repository"
          title="GitHub repository"
        >
          <i class="fa-brands fa-github" aria-hidden="true"></i>
          <span class="repo-link__text">View code</span>
        </a>
        <p class="eyebrow">Node.js Utility</p>
        <div class="hero-copy">
          <div>
            <h1>Community Avatar Generator</h1>
            <p>Standardize community avatars with a circular template, consistent icons, and immediate PNG export.</p>
          </div>
        </div>
      </section>

      <div class="workspace">
        <article class="controls-card">
          <header class="section-heading">
            <p class="eyebrow">Settings</p>
          </header>

          <div class="controls-stack">
            <select id="role" name="role" aria-describedby="roleHelp">
              <option value="ios">iOS</option>
              <option value="android">Android</option>
              <option value="react">React</option>
              <option value="qa">QA</option>
              <option value="adm">ADM</option>
              <option value="pm">PM</option>
              <option value="po">PO</option>
            </select>

            <input id="titleText" name="titleText" type="text" maxlength="64" value="Tech Lead iOS" placeholder="e.g. Tech Lead iOS">
          </div>
        </article>

        <article class="preview-card">
          <header class="section-heading">
            <p class="eyebrow">Preview</p>
            <button id="downloadButton" type="button" aria-label="Download PNG" title="Download PNG">
              <span class="download-button__label">Download</span>
              <span data-lucide="download"></span>
            </button>
          </header>

          <div class="canvas-frame">
            <canvas id="avatarCanvas" width="640" height="640" aria-label="Avatar preview"></canvas>
          </div>
          <div class="tuning-grid">
            <div class="tuning-column">
              <h3>Background</h3>

              <div class="range-block">
                <input id="backgroundUpload" name="backgroundUpload" type="file" accept="image/png,image/jpeg,image/webp">
              </div>

              <div class="range-block">
                <label for="backgroundScale">Scale</label>
                <input id="backgroundScale" name="backgroundScale" type="range" min="0.5" max="1.8" step="0.01" value="1">
              </div>

              <div class="range-block">
                <label for="backgroundOffsetX">Horizontal position</label>
                <input id="backgroundOffsetX" name="backgroundOffsetX" type="range" min="-160" max="160" step="1" value="0">
              </div>

              <div class="range-block range-block--vertical">
                <label for="backgroundOffsetY">Vertical position</label>
                <div class="vertical-range">
                  <div class="vertical-range__track">
                    <input id="backgroundOffsetY" name="backgroundOffsetY" type="range" min="-160" max="160" step="1" value="0" aria-orientation="vertical">
                  </div>
                </div>
              </div>
            </div>

            <div class="tuning-column">
              <h3>Portrait</h3>

              <div class="range-block">
                <input id="portraitUpload" name="portraitUpload" type="file" accept="image/png">
              </div>

              <div class="range-block">
                <label for="portraitScale">Scale</label>
                <input id="portraitScale" name="portraitScale" type="range" min="0.5" max="1.8" step="0.01" value="1">
              </div>

              <div class="range-block">
                <label for="portraitOffsetX">Horizontal position</label>
                <input id="portraitOffsetX" name="portraitOffsetX" type="range" min="-160" max="160" step="1" value="0">
              </div>

              <div class="range-block range-block--vertical">
                <label for="portraitOffsetY">Vertical position</label>
                <div class="vertical-range">
                  <div class="vertical-range__track">
                    <input id="portraitOffsetY" name="portraitOffsetY" type="range" min="-160" max="160" step="1" value="12" aria-orientation="vertical">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </div>
    </main>

    <script src="/node_modules/lucide/dist/umd/lucide.min.js"></script>
    <script src="avatar-core.js"></script>
    <script src="script.js"></script>
  </body>
</html>
